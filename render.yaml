services:
  - type: web
    name: voicecare-content-gap-agent
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn api.index:app --bind 0.0.0.0:$PORT --worker-class gevent --workers 2 --timeout 300
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      # ── Add your real API keys in the Render dashboard ──
      # These placeholders show which env vars the app expects.
      - key: OPENAI_API_KEY
        value: "sk-placeholder"
      - key: FIRECRAWL_API_KEY
        value: "fc-placeholder"
      - key: SEMRUSH_API_KEY
        value: "placeholder"
      - key: SEMRUSH_DATABASE
        value: "us"
      - key: NOTION_API_KEY
        value: "ntn-placeholder"
      - key: NOTION_DATABASE_ID
        value: "placeholder"
      - key: COMPANY_NAME
        value: "Voicecare.ai"
      - key: TARGET_AUDIENCE
        value: "Healthcare providers, clinic managers, and digital health teams"
